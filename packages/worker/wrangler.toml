name = "ccr-router"
main = "src/index.ts"
compatibility_date = "2024-01-01"
keep_vars = true

[[durable_objects.bindings]]
name = "ROUTER"
class_name = "RouterDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RouterDO"]

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "pigeon-media"

[triggers]
crons = ["0 * * * *"]

[vars]
ALLOWED_CHAT_IDS = "8248645256"
